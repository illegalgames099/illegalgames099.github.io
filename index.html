<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps Engine</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-sidebar: #121215;
            --bg-control: #1a1a1e;
            --border-color: #26262b;
            --text-main: #f4f4f5;
            --text-muted: #8e8e93;
            --accent: #ff3344; /* Premium crisp red */
            --accent-hover: #e02233;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden;
        }

        /* App Layout Container */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Left Sidebar Controls */
        .sidebar {
            width: 320px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* App Brand/Header */
        .brand-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-main);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Sidebar Content Sections */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .control-group {
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Minimal Search Input */
        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-control);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* Utility Toggle List */
        .layer-list {
            list-style: none;
        }

        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 13px;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Custom Minimal Checkbox */
        .custom-toggle {
            appearance: none;
            width: 32px;
            height: 18px;
            background-color: var(--bg-control);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .custom-toggle:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .custom-toggle::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-main);
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .custom-toggle:checked::before {
            transform: translateX(14px);
        }

        /* Action Buttons */
        .btn-primary {
            width: 100%;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Main Viewport Container (Where the map lives) */
        .viewport-container {
            flex: 1;
            height: 100%;
            position: relative;
            background-color: var(--bg-main);
        }

        /* Map Placeholder Canvas */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Premium Overlay Placeholder Status (Delete or keep until map loads) */
        .map-fallback-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 2;
        }

        .map-fallback-ui p {
            font-size: 12px;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column-reverse;
            }
            .sidebar {
                width: 100%;
                height: 40%;
                border-right: none;
                border-top: 1px solid var(--border-color);
            }
            .viewport-container {
                height: 60%;
            }
            .brand-header {
                padding: 14px 24px;
            }
            .sidebar-content {
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Left Application Dashboard Panel -->
        <aside class="sidebar">
            <div class="brand-header">
                <div class="brand-title">Studio.Maps</div>
                <div class="status-dot"></div>
            </div>
            
            <div class="sidebar-content">
                <!-- Navigation / Search Group -->
                <div class="control-group">
                    <div class="section-label">Location Index</div>
                    <div class="search-wrapper">
                        <input type="text" class="search-input" placeholder="Search coordinates or regions...">
                    </div>
                </div>

                <!-- Layer Filters Group -->
                <div class="control-group">
                    <div class="section-label">Data Overlays</div>
                    <ul class="layer-list">
                        <li class="layer-item">
                            <span>Terrain Mesh</span>
                            <input type="checkbox" class="custom-toggle" checked>
                        </li>
                        <li class="layer-item">
                            <span>Vector Structural Footprints</span>
                            <input type="checkbox" class="custom-toggle" checked>
                        </li>
                        <li class="layer-item">
                            <span>Infrastructure & Grid Lines</span>
                            <input type="checkbox" class="custom-toggle">
                        </li>
                    </ul>
                </div>

                <!-- Primary Core Interface Call to Action -->
                <div class="control-group" style="margin-top: auto; margin-bottom: 0;">
                    <button class="btn-primary" id="recenter-btn">Recenter Viewport</button>
                </div>
            </div>
        </aside>

        <!-- Right Mapping Frame -->
        <main class="viewport-container">
            <!-- Map target container target -->
            <div id="map"></div>

            <!-- Temporary Clean Grid Indicator Context -->
            <div class="map-fallback-ui" id="fallback-ui">
                <p>Engine Active // Awaiting Map Core Initialization</p>
            </div>
        </main>

    </div>

    <!-- Integrate your Mapbox / Leaflet initialization scripts directly below -->
    <script>
        // Example structure for when you drop your Mapbox API script links into the head:
        // document.addEventListener("DOMContentLoaded", () => {
        //     const fallback = document.getElementById('fallback-ui');
        //     if(fallback) fallback.style.display = 'none'; // hide placeholder text once map loads
        // });
    </script>
</body>
</html>
